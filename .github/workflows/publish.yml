name: Manual Alire Publish

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # We use the default token here to avoid the "Username" error
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Alire
        uses: alire-project/setup-alire@v3
        with:
          version: '2.1.0'

      - name: Create and Push Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ github.event.inputs.version_tag }}" >/dev/null 2>&1; then
            echo "Tag already exists."
          else
            git tag -a ${{ github.event.inputs.version_tag }} -m "Release ${{ github.event.inputs.version_tag }}"
            git push origin ${{ github.event.inputs.version_tag }}
          fi

      - name: Publish to Alire
        env:
          # This is where your Personal Access Token is used
          MY_ALIRE_TOKEN: ${{ secrets.ALIRE_GITHUB_TOKEN }}
        run: |
          # 1. Configure the PAT for Alire
          alr config --set --global github.token "$MY_ALIRE_TOKEN"
          
          # 2. Go to your folder
          cd ada
          
          # 3. Setup toolchain
          alr toolchain --select gnat_native
          alr toolchain --select gprbuild
          
          # 4. Publish
          alr publish --non-interactive
